<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c8381e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Brandschutz">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Brandschutz-Prüfung</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f4f3ef;color:#181816;min-height:100vh;display:flex;flex-direction:column}
.bar{background:#c8381e;color:white;padding:14px 1.25rem;display:flex;align-items:center;gap:10px}
.bar svg{width:24px;height:24px;fill:white;flex-shrink:0}
.bar-title{font-weight:700;font-size:16px}
.bar-sub{font-size:12px;opacity:.75;margin-top:1px}
.page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.25rem;gap:16px;max-width:420px;margin:0 auto;width:100%}
.nav-card{width:100%;background:white;border:1px solid #e3e1d9;border-radius:14px;padding:1.75rem 1.5rem;display:flex;align-items:center;gap:1.25rem;cursor:pointer;text-decoration:none;color:#181816;transition:all .15s;-webkit-user-select:none;user-select:none}
.nav-card:active{transform:scale(.97);background:#fdf5f3}
.nav-icon{width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:26px}
.icon-pruef{background:#fdf0ed}
.icon-verw{background:#eaf3de}
.nav-title{font-size:18px;font-weight:700;margin-bottom:3px}
.nav-sub{font-size:13px;color:#6a6a64;line-height:1.4}
.divider{font-size:12px;color:#aaa;text-align:center;width:100%}
.date{font-size:13px;color:#6a6a64;margin-top:1rem;text-align:center}
</style>
</head>
<body>
<div class="bar">
  <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
  <div>
    <div class="bar-title">Brandschutz-Prüfung</div>
    <div class="bar-sub" id="bar-date"></div>
  </div>
</div>

<div class="page">
  <a class="nav-card" href="pruefung.html">
    <div class="nav-icon icon-pruef">🔍</div>
    <div>
      <div class="nav-title">Prüfung durchführen</div>
      <div class="nav-sub">Tür scannen und Prüfformular ausfüllen</div>
    </div>
  </a>

  <div class="divider">oder</div>

  <a class="nav-card" href="verwaltung.html">
    <div class="nav-icon icon-verw">⚙️</div>
    <div>
      <div class="nav-title">Verwaltung</div>
      <div class="nav-sub">Türen importieren, QR-Codes generieren, Protokoll exportieren</div>
    </div>
  </a>

  <div class="date" id="date"></div>
</div>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js');
}
const now = new Date();
const opts = {weekday:'long',day:'numeric',month:'long',year:'numeric'};
document.getElementById('bar-date').textContent = now.toLocaleDateString('de-DE', opts);
document.getElementById('date').textContent = '';
</script>
</body>
</html>
